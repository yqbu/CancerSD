dataset:
  name: "STAD"
  root: "processed/STAD"
  omics:
    - "methylation"
    - "miRNA"
    - "mRNA"
  diagnosis_file: "patient_diagnose.csv"
  suffix: ""
  omics_state: "both"
  race: ~
  mode: "include"
  label_column: "subtype"

  subtype_map:
    EBV: 0
    MSI: 1
    GS: 2
    CIN: 3

  split:
    seed: 42
    train_ratio: 0.7
    validation_ratio: 0.1
    test_ratio: 0.2
    stratify: true

  shuffle_result: true

  missing:
    enabled: true
    missing_rate: 0.5